plugins {
    id "com.android.application"
}

android {
    namespace "com.pocketlan.android"
    compileSdk 36

    defaultConfig {
        applicationId "com.pocketlan.android"
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "1.0.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main {
            assets.srcDirs = ["../client/dist"]
        }
    }
}

dependencies {
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "com.google.android.material:material:1.12.0"
}
